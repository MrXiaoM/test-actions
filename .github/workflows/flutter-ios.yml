name: Build Flutter iOS

on:
  workflow_dispatch:
    inputs:
      target_repository:
        description: 'Repository'
        required: true
        type: string

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target_repository }}
          token: ${{ secrets.BUILT_IOS_APP_TOKEN }}

      - name: List files
        run: |
          ls -la ./
          ls -la ./frontend

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.7'
          cache: true

      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get
      
      - name: Force Disable Xcode Automatic Signing
        run: |
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' frontend/ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' frontend/ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' frontend/ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' frontend/ios/Runner.xcodeproj/project.pbxproj

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ./frontend/ios

      # - name: Run build_runner
      #   run: |
      #     cd frontend
      #     dart run build_runner build -t lib/main.dart --delete-conflicting-outputs

      - name: Build iOS
        run: |
          cd frontend
          flutter build ios -t lib/main.dart --release --no-codesign
          ls -la build/ios
          ls -la build/ios/iphoneos

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifact
          path: frontend/build/ios/iphoneos/*
          retention-days: 3
